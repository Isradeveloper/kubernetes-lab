apiVersion: v1
kind: Pod
metadata:
  name: nginx-configmap
spec:
  containers:
    - name: nginx
      image: nginx:1.14.2
      # STEP 2: mount the volumen in the container
      volumeMounts:
        - name: dc-heroes
          mountPath: etc/nginx/heroes.txt
          subPath: heroes.txt
          #! SI LA RUTA NO ES NUEVA Y NO TIENE EL SUBPATH VA A BORRAR TODO
      ports:
        - containerPort: 80
      resources:
        requests: #Cantidad de recursos que se le asignan al contenedor
          cpu: 100m # 100 millicores
          memory: "100M" # 128 megabytes
        limits:
          cpu: 200m # 200 millicores
          memory: "200M" # 256 megabytes
    # STEP 1: add the configMap as a volumen
  volumes:
    - name: dc-heroes
      configMap:
        name: dem-heroes
